<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v2.1</title>
<link rel="stylesheet" href="version2.0.0.css">
</head>
<body>
    <h1>明倫知多少？</h1>
    <div id="question"></div>
    <div id="options">
        <button id="option-1" onclick="checkAnswer(0)"></button>
        <button id="option-2" onclick="checkAnswer(1)"></button>
        <button id="option-3" onclick="checkAnswer(2)"></button>
        <button id="option-4" onclick="checkAnswer(3)"></button>
    </div>

    <div id="score-container">
        分數: <span id="score">0</span>
    </div>

    <div id="end-container" style="display: none;">
        <h2>遊戲結束</h2>
    </div>

    <script src="version2.0.0.js"></script>
    <script>

        const scoreElement = document.getElementById("score");
        const endContainer = document.getElementById("end-container");
        const finalScoreElement = document.getElementById("final-score");

        let score = 0;
        let cnt = 0;
        let currentQuestionIndex = 0;
        let numQuesion = 1;
        if (numQuesion > question.length + 1) {
            numQuesion = question.length;
        }

        function showQuestion(index) {
            if (index < questions.length) {
                const questionElement = document.getElementById("question");
                questionElement.textContent = numQuesion + (". ") + questions[index].question;

                const optionsElement = document.getElementById("options");
                optionsElement.innerHTML = "";

                questions[index].options.forEach((option, i) => {
                    const button = document.createElement("button");
                    button.textContent = "(" + String.fromCharCode(65 + i) + ") " + option;
                    button.onclick = () => checkAnswer(i);
                    optionsElement.appendChild(button);
                });
            } else {
                endContainer.style.display = "block";
                finalScoreElement.textContent = score;
            }
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === questions[currentQuestionIndex].correctAnswer) {
                score += 10;
                scoreElement.textContent = score;
                cnt += 1;
                numQuesion += 1;
            } else {
                cnt += 1;
                numQuesion += 1;
            }

            currentQuestionIndex++;
            showQuestion(currentQuestionIndex);
        }

        scoreElement.innerHTML = score;
        showQuestion(currentQuestionIndex);
    </script>
</body>

</html>
