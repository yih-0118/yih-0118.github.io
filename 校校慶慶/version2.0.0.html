<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v2.1</title>
    <link rel="stylesheet" href="version2.0.0.css">
    <link rel="shortcut icon" href="1698722833.ico" />
</head>
<body>
    <div id="end-container" style="display: none;">
        <div id="end-container-text">遊戲結束</div>
        <div id="end-container-score">答對題數: <span id="score-end">0</span></div>
    </div>
    </div>
    <h1>明倫知多少？</h1>
    <div id="question"></div>
    <div id="options">
        <button id="option-1" onclick="checkAnswer(0)"></button>
        <button id="option-2" onclick="checkAnswer(1)"></button>
        <button id="option-3" onclick="checkAnswer(2)"></button>
        <button id="option-4" onclick="checkAnswer(3)"></button>
    </div>

    <div id="score-container">
        答對題數: <span id="score">0</span>
    </div>
    <script src="version2.0.0.js"></script>
    <script>

        const score_element = document.getElementById("score");
        const end_container = document.getElementById("end-container");
        const game_over_score = document.getElementById("score-end");

        let score = 0;
        let cnt = 0;
        let current_question_index = 0;
        let number_of_quesion = 1;

        if (number_of_quesion > question.length + 1) {
            number_of_quesion = question.length;
        }

        function show_question(index) {
            if (index < questions.length) {
                const questionElement = document.getElementById("question");
                questionElement.textContent = number_of_quesion + (". ") + questions[index].question;

                const optionsElement = document.getElementById("options");
                optionsElement.innerHTML = "";

                questions[index].options.forEach((option, i) => {
                    const button = document.createElement("button");
                    button.textContent = "(" + String.fromCharCode(65 + i) + ") " + option;
                    button.onclick = () => checkAnswer(i);
                    optionsElement.appendChild(button);
                });
            } else {
                end_container.style.display = "block";
            }
        }

        function checkAnswer(selected_index) {
            if (selected_index === questions[current_question_index].correct_answer) {
                score += 1;
                game_over_score.textContent = score;
                score_element.textContent = score;
                cnt += 1;
                number_of_quesion += 1;
            } else {
                
                cnt += 1;
                number_of_quesion += 1;
                game_over_score.textContent = score;
                score_element.textContent = score;
                alert("答錯了唷！")
            }

            current_question_index++;
            show_question(current_question_index);
        }

        game_over_score.innerHTML = score;
        score_element.innerHTML = score;
        show_question(current_question_index);



    </script>
</body>

</html>
