            background: rgb(49, 199, 226);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            color: black;
            font-size: 25px;
        }

        @media (max-width: 768px) {

            .container,
            .card {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
            }
        }

        @media (max-width: 768px) {
            h5 {
