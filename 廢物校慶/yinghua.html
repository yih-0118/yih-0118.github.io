<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="../js/yinghua.js"></script>
    <style>
        body {
            box-sizing: border-box;
            background-image: url(42643.jpg);
            background-repeat: no-repeat;
            background-position: 70% 50%;
            background-size: contain;
            background-color: white;
            background-attachment: fixed;
        }
        img {
            width: 50px;
            height: 50px;
            margin-top: -5%;
            opacity: 0.5;
            position: absolute;
            z-index: 99;
            border-radius: 5px;
        }
        .card-body {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 10px;
            margin-top: 10%;
            margin-left: 10%;
            margin-right: 10%;
            margin-bottom: 10%;
            color: white;
            font-size: 1.5em;
            font-family: 'Roboto', sans-serif;
            border-left: 20%;
        }
        .card {
            border-radius: 20px;
            margin-top: 10%;
        }
        .container {
            display: flex;
        }
        .buttons {
            flex: 1;
        }
        .cherry {
            flex: 5;
        }
        button {
            background: rgb(49, 199, 226);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            color: black;
            font-size: 25px;
        }
        @media (max-width: 768px) {

            .container,
            .card {
                width: 100%;
            }
        }
        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
            }
        }
        @media (max-width: 768px) {
            h5 {
                font-size: 40px
            }
            button {
                padding: 16px 24px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="cherry">
        <!-- <img id="yinghua" src="../image/yinghua.png" alt=""> -->
    </div>
    <div class="card" style="width: 40rem;">
        <div class="card-body">
            <h5 class="card-title">你懂美嗎？ by 慎固</h5>
            <button id="yes">懂</button>
            <button id="no">不懂</button>
            <button id="fuck">幹</button>
            <button id="love">愛</button>
            <button id="pee">戳屁屁</button>
        </div>
    </div>
    <script>
        
        document.getElementById("yes").addEventListener('click', function () {
            const heart = document.createElement("yes");
            heart.innerText = "你根本就不懂塞尚！";
            heart.style.fontSize = "45px";

            heart.style.position = "absolute";
            heart.style.left = Math.random() * 90 + "vw";
            heart.style.top = Math.random() * 90 + "vh";
            heart.style.animation = "fade 3s linear";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1000);
        });

        document.getElementById("no").addEventListener('click', function () {
            const heart = document.createElement("no");
            heart.innerText = "滾!🫵";
            heart.style.fontSize = "80px";

            heart.style.position = "absolute";
            heart.style.left = Math.random() * 90 + "vw";
            heart.style.top = Math.random() * 90 + "vh";
            heart.style.animation = "fade 3s linear";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1000);
        });

        document.getElementById("fuck").addEventListener('click', function () {
            const heart = document.createElement("fuck");
            heart.innerText = "幹🤬";
            heart.style.fontSize = "80px";

            heart.style.position = "absolute";
            heart.style.left = Math.random() * 90 + "vw";
            heart.style.top = Math.random() * 90 + "vh";
            heart.style.animation = "fade 3s linear";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1000);
        });

        document.getElementById("love").addEventListener('click', function () {
            const heart = document.createElement("love");
            heart.innerText = "❤️";
            heart.style.fontSize = "80px";

            heart.style.position = "absolute";
            heart.style.left = Math.random() * 90 + "vw";
            heart.style.top = Math.random() * 90 + "vh";
            heart.style.animation = "fade 3s linear";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1000);
        });

        document.getElementById("pee").addEventListener('click', function () {
            const heart = document.createElement("pee");
            heart.innerText = "慎固：啊～好痛痛👇";
            heart.style.fontSize = "45px";

            heart.style.position = "absolute";
            heart.style.left = Math.random() * 90 + "vw";
            heart.style.top = Math.random() * 90 + "vh";
            heart.style.animation = "fade 3s linear";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1000);
        });
    </script>
</body>
</html>
