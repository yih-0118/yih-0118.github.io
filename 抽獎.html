<!DOCTYPE html>
<html lang="zh-Hant">

<head>
	<meta charset="UTF-8">
	<title>抽獎</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		.container {
			margin: 20px auto;
			width: 90%;
			max-width: 400px;
		}

		h2 {
			text-align: center;
		}

		span {
			display: inline-block;
		}

		#list {
			margin-top: 20px;
			width: 100%;
			height: 40px;
			text-align: center;
			font-size: 20px;
			font-weight: bold;
			color: red;
			line-height: 40px;
			border: 2px solid red;
			transition: transform 0.1s ease-in-out, background-color 0.5s;
		}

		#start,
		#stop {
			margin-top: 30px;
			margin-right: 10px;
			text-align: center;
			width: 50px;
			height: 30px;
			background: rgb(0, 51, 102);
			line-height: 30px;
			cursor: pointer;
			color: #fff;
			border-radius: 6px;
		}

		#count {
			margin-top: 20px;
			text-align: center;
			font-size: 18px;
			color: #333;
		}

		#resultList {
			margin-top: 20px;
			padding: 0;
			list-style: none;
		}

		#resultList li {
			text-align: center;
			font-size: 16px;
			color: #333;
			padding: 5px 0;
			border-bottom: 1px solid #ccc;
		}

		.decription {
			width: 90%;
			margin: 20px auto;
			text-align: center;
			font-size: 14px;
			color: #555;
		}
	</style>
</head>

<body>
	<div class="container">
		<h2>開始抽獎了</h2>
		<span id="list">馬上開獎</span>
		<div style="text-align: center;">
			<span id="start">開始</span>
			<span id="stop">停止</span>
		</div>
		<div id="count">已抽次數: 0</div>
		<ul id="resultList"></ul>
	</div>

	<script type="text/javascript">
		var list = document.getElementById('list'),
			start = document.getElementById('start'),
			stop = document.getElementById('stop'),
			count = document.getElementById('count'),
			resultList = document.getElementById('resultList');

		// 獎品及其對應的機率
		var prizes = [
			{ name: "五星裝", weight: 700 },
			{ name: "六星裝", weight: 270 },
			{ name: "七星廢物裝", weight: 10 },
			{ name: "七星合作裝", weight: 10 },
			{ name: "八星廢物裝", weight: 5 },
			{ name: "八星合作裝", weight: 5 },
		];

		// 根據機率生成獎品數組
		var arr = [];
		prizes.forEach(function (prize) {
			for (var i = 0; i < prize.weight; i++) {
				arr.push(prize.name);
			}
		});

		var timer = null;
		var flag = 0;
		var drawCount = 0;

		window.onload = function () {
			start.onclick = playFun;
			stop.onclick = stopFun;

			document.onkeyup = keyupEvent;
		}

		//鍵盤事件
		function keyupEvent(e) {
			e = e || window.event;
			if (e.keyCode == 32) { // 32 是空白鍵的鍵碼
				if (flag == 0) {
					playFun();
					flag = 1;
				} else {
					stopFun();
					flag = 0;
				}
			}
		}

		//滑鼠點擊事件
		function playFun() {
			clearInterval(timer);
			timer = setInterval(function () {
				var random = Math.floor(Math.random() * arr.length);
				list.innerText = arr[random];
				list.style.transform = 'scale(1.2)';
				setTimeout(function () {
					list.style.transform = 'scale(1)';
				}, 100);
			}, 50);
			start.style.background = 'rgb(153, 153, 153)';
		}

		function stopFun() {
			clearInterval(timer);
			start.style.background = 'rgb(0, 51, 102)';
			list.style.backgroundColor = 'yellow'; // 中獎效果
			list.style.color = 'black'; // 中獎效果
			setTimeout(function () {
				list.style.backgroundColor = 'white';
				list.style.color = 'red';
			}, 500);
			drawCount++; // 每次停止時增加計數器
			count.innerText = "已抽次數: " + drawCount;
			// 將結果添加到列表
			var li = document.createElement('li');
			li.innerText = list.innerText;
			resultList.appendChild(li);
		}
	</script>
</body>

</html>
